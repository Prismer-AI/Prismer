# ============================================================
# Prismer Academic + OpenClaw (v5.0)
# ============================================================
#
# Build:
#   docker compose -f docker-compose.openclaw.yml build
#
# Run:
#   docker compose -f docker-compose.openclaw.yml up
#
# All services via unified gateway on :16888:
#   http://localhost:16888/api/v1/latex/*       LaTeX compile
#   http://localhost:16888/api/v1/prover/*      Prover (Coq/Z3)
#   http://localhost:16888/api/v1/jupyter/*     Jupyter server
#   http://localhost:16888/api/v1/gateway/*     OpenClaw Gateway
#   http://localhost:16888/api/v1/arxiv/*       arXiv paper conversion
#   http://localhost:16888/api/v1/health        Aggregated health check
#

services:
  prismer-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: prismer-web:latest
    container_name: prismer-web

    env_file:
      - ../.env

    ports:
      - "3000:3000"

    environment:
      CONTAINER_GATEWAY_URL: http://prismer-agent:3000
      AGENT_GATEWAY_URL: http://prismer-agent:3000
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-prismer-dev-token}
      AUTH_TRUST_HOST: "true"
      AUTH_DEV_MODE: "true"

    volumes:
      - prismer-data:/app/prisma

    depends_on:
      - prismer-agent

    restart: unless-stopped

  prismer-agent:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
      args:
        BASE_IMAGE: ghcr.io/prismer-ai/prismer-academic:v5.0-lite
    image: prismer-academic:v5.0-openclaw
    container_name: prismer-agent

    env_file:
      - ../.env

    ports:
      - "16888:3000"  # Unified Container Gateway

    environment:
      # Prismer IM
      PRISMER_IM_SERVER_URL: ${PRISMER_IM_SERVER_URL:-http://prismer-web:3456}
      PRISMER_CONVERSATION_ID: ${PRISMER_CONVERSATION_ID:-test-conversation}
      PRISMER_AGENT_TOKEN: ${PRISMER_AGENT_TOKEN:-dev-token}
      PRISMER_API_BASE_URL: ${PRISMER_API_BASE_URL:-http://prismer-web:3000}
      PRISMER_AGENT_ID: ${PRISMER_AGENT_ID:-default}

      # Model API Key (loaded from env_file, do not override here)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # OpenClaw Gateway Token
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-prismer-dev-token}

    volumes:
      - prismer-workspace:/workspace

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

volumes:
  prismer-data:
  prismer-workspace:
