name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Prismer is affected?
      options:
        - Web UI (workspace)
        - Paper Reader
        - LaTeX Editor
        - Jupyter Notebooks
        - Docker / Container
        - Agent / OpenClaw
        - API
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Prismer version or git commit SHA
      placeholder: e.g., v0.1.0 or abc1234

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node.js version, Docker version, etc.
      placeholder: |
        - OS: Ubuntu 24.04
        - Browser: Chrome 130
        - Node.js: 20.x
        - Docker: 27.x

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Relevant error logs, console output, or screenshots
